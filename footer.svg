<svg width="860" height="80" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, monospace">
  <defs>
    <style>
      .footer-wave1 { animation: footerDraw1 2s linear infinite; stroke-dasharray: 900; stroke-dashoffset: 900; }
      .footer-wave2 { animation: footerDraw2 2.4s linear infinite; stroke-dasharray: 900; stroke-dashoffset: 900; }
      .footer-wave3 { animation: footerDraw3 1.8s linear infinite; stroke-dasharray: 900; stroke-dashoffset: 900; }
      .scan-line { animation: scanLine 2s linear infinite; }
      .status-text { animation: statusBlink 1.5s step-end infinite; }
      .grid-fade { animation: gridPulse 3s ease-in-out infinite; }

      @keyframes footerDraw1 {
        0% { stroke-dashoffset: 900; opacity: 0.3; }
        30% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes footerDraw2 {
        0% { stroke-dashoffset: 900; opacity: 0.3; }
        30% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes footerDraw3 {
        0% { stroke-dashoffset: 900; opacity: 0.3; }
        30% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes scanLine {
        0% { transform: translateX(-860px); opacity: 0.1; }
        100% { transform: translateX(870px); opacity: 0.1; }
      }
      @keyframes statusBlink {
        0%, 60% { opacity: 1; }
        61%, 100% { opacity: 0; }
      }
      @keyframes gridPulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.7; }
      }
    </style>
    <pattern id="footerGrid" width="43" height="40" patternUnits="userSpaceOnUse">
      <path d="M 43 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="footerClip">
      <rect x="0" y="0" width="860" height="80"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="860" height="80" fill="#0a0a0f"/>
  <rect width="860" height="80" fill="url(#footerGrid)" class="grid-fade"/>

  <!-- 스캔라인 -->
  <rect class="scan-line" x="0" y="0" width="3" height="80" fill="#ffffff"/>

  <!-- CH1 파형 -->
  <g clip-path="url(#footerClip)">
    <polyline class="footer-wave1" filter="url(#glow)" points="
      0,25 20,25 20,10 33,10 33,25 46,25 46,10 59,10 59,25
      72,25 72,10 85,10 85,25 98,25 98,10 111,10 111,25
      124,25 137,25 137,10 150,10 150,25 163,25 163,10 176,10 176,25
      189,25 202,25 202,10 215,10 215,25 228,25 228,10 241,10 241,25
      254,25 267,25 267,10 280,10 280,25 293,25 306,25 319,25 319,10 332,10 332,25
      345,25 358,25 358,10 371,10 371,25 384,25 397,25 410,25 410,10 423,10 423,25
      436,25 449,25 449,10 462,10 462,25 475,25 488,25 488,10 501,10 501,25
      514,25 527,25 527,10 540,10 540,25 553,25 566,25 579,10 579,25
      592,25 605,25 618,10 618,25 631,25 644,25 657,10 657,25
      670,25 683,25 696,10 696,25 709,25 722,25 860,25
    " fill="none" stroke="#ffcc00" stroke-width="1.5"/>
  </g>

  <!-- CH2 파형 -->
  <g clip-path="url(#footerClip)">
    <polyline class="footer-wave2" filter="url(#glow)" points="
      0,45 15,45 15,30 25,30 25,45 35,45 35,30 45,30 45,45
      55,45 65,45 65,30 75,30 75,45 85,45 95,45 95,30 105,30 105,45
      115,45 125,45 125,30 135,30 135,45 145,45 155,45 165,45 165,30 175,30 175,45
      185,45 195,45 205,45 205,30 215,30 215,45 225,45 235,45 235,30 245,30 245,45
      255,45 265,45 275,45 275,30 285,30 285,45 295,45 305,45 315,30 315,45
      325,45 335,45 345,45 345,30 355,30 355,45 365,45 375,45 385,30 385,45
      395,45 405,45 415,45 415,30 425,30 425,45 435,45 445,45 455,30 455,45
      465,45 475,45 485,45 485,30 495,30 495,45 505,45 515,45 525,30 525,45
      535,45 545,45 555,45 555,30 565,30 565,45 575,45 585,45 595,30 595,45
      605,45 615,45 625,45 625,30 635,30 635,45 645,45 655,45 665,30 665,45
      675,45 685,45 695,45 695,30 705,30 705,45 860,45
    " fill="none" stroke="#00aaff" stroke-width="1.5"/>
  </g>

  <!-- CH3 파형 -->
  <g clip-path="url(#footerClip)">
    <polyline class="footer-wave3" filter="url(#glow)" points="
      0,65 10,65 10,55 15,55 15,65 20,65 20,55 25,55 25,65
      30,65 30,55 35,55 35,65 40,65 40,55 45,55 45,65
      60,65 60,55 65,55 65,65 70,65 70,55 75,55 75,65
      80,65 80,55 85,55 85,65 90,65 90,55 95,55 95,65
      110,65 110,55 115,55 115,65 120,65 120,55 125,55 125,65
      130,65 130,55 135,55 135,65 140,65 140,55 145,55 145,65
      160,65 160,55 165,55 165,65 170,65 170,55 175,55 175,65
      180,65 180,55 185,55 185,65 190,65 190,55 195,55 195,65
      210,65 210,55 215,55 215,65 220,65 220,55 225,55 225,65
      230,65 230,55 235,55 235,65 240,65 240,55 245,55 245,65
      260,65 260,55 265,55 265,65 270,65 270,55 275,55 275,65
      280,65 280,55 285,55 285,65 290,65 290,55 295,55 295,65
      310,65 310,55 315,55 315,65 320,65 320,55 325,55 325,65
      330,65 330,55 335,55 335,65 340,65 340,55 345,55 345,65
      360,65 360,55 365,55 365,65 370,65 370,55 375,55 375,65
      380,65 380,55 385,55 385,65 390,65 390,55 395,55 395,65
      860,65
    " fill="none" stroke="#00ff88" stroke-width="1.5"/>
  </g>

  <!-- 우측 정보 패널 -->
  <rect x="700" y="5" width="150" height="70" fill="#050510" rx="3" stroke="#3333aa" stroke-width="1"/>
  <text x="710" y="20" fill="#4444cc" font-size="9">CH1 UART  CH2 CAN</text>
  <text x="710" y="34" fill="#4444cc" font-size="9">CH3 SPI</text>
  <line x1="700" y1="38" x2="850" y2="38" stroke="#222255" stroke-width="1"/>
  <text x="710" y="52" fill="#ffcc00" font-size="9">115.2kHz</text>
  <text x="775" y="52" fill="#00aaff" font-size="9">500kbps</text>
  <text x="710" y="65" fill="#00ff88" font-size="9">8MHz</text>
  <text x="775" y="65" class="status-text" fill="#00ff41" font-size="9">● RUN</text>

</svg>
